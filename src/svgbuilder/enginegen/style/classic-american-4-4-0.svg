    <circle cx="174" cy="102" r="8" fill="#cfcdc3"/>
    <circle cx="174" cy="102" r="7" fill="#2c2c2a"/>
    <circle cx="174" cy="102" r="2" fill="#0e0e0e"/>
    <!-- driving wheels: steel tire + dark spoked wheel (#2c2c2a = canvas spins it) -->
    <circle cx="60" cy="94" r="16.5" fill="#cfcdc3"/>
    <circle cx="60" cy="94" r="15" fill="#2c2c2a"/>
    <g stroke="#54534d" stroke-width="1.4">
