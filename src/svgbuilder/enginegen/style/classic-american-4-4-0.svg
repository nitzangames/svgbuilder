    <rect x="100" y="40" width="1.6" height="8" fill="#d9a834"/>
    <circle cx="100.8" cy="39.5" r="1.4" fill="#f4c775"/>
    <rect x="107" y="44" width="1.6" height="6" fill="#7a6a30"/>
    <path d="M105 44.5 Q108 40 111 44.5 Z" fill="#d9a834"/>
    <circle cx="108" cy="44.8" r="1" fill="#f4c775"/>

