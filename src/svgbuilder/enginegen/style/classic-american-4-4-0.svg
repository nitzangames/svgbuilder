    <rect x="163" y="45" width="11" height="5" fill="#d9a834"/>
    <path d="M164,50 C162,44 157,38 152,32 L184,32 C179,38 174,44 172,50 Z" fill="#191919"/>
    <path d="M164,50 C162,44 157,38 152,32 L159,32 C162,39 165,45 167,50 Z" fill="#2a2828"/>
    <rect x="149" y="29" width="38" height="4" rx="2" fill="#0e0e0e"/>
    <path d="M152,30 Q168,22 184,30 Z" fill="#191919"/>
    <rect x="166.8" y="19" width="2.4" height="5" fill="#0e0e0e"/>
