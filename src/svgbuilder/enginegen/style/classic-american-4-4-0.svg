    <circle cx="189" cy="45" r="3.4" fill="#f4c775"/>
    <circle cx="189" cy="45" r="3.4" fill="none" stroke="#d9a834" stroke-width="1"/>

    <!-- running-board pinstripe -->
    <rect x="2" y="81" width="184" height="1.8" fill="#d9a834"/>
  </g></svg>