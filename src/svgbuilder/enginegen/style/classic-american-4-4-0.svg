      <line x1="108.45" y1="103.55" x2="127.55" y2="84.45"/>
    </g>
    <circle cx="118" cy="94" r="3.8" fill="#0e0e0e"/>
    <!-- connecting (side) rod with crank pins -->
    <rect x="58" y="92" width="62" height="4" rx="2" fill="#b07a2a"/>
    <circle cx="60" cy="94" r="2.8" fill="#8a3b2a"/>
    <circle cx="118" cy="94" r="2.8" fill="#8a3b2a"/>

