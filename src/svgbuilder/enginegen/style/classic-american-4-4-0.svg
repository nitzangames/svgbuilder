    <rect x="2" y="50" width="46" height="33" fill="#1f6b54"/>
    <rect x="2" y="46" width="42" height="37" fill="#1f6b54"/>
    <rect x="2" y="46" width="4" height="37" fill="#2c8268"/>
    <rect x="2" y="40" width="42" height="8" fill="#15493a"/>
    <rect x="7" y="41" width="13" height="14" rx="3" fill="#0c2620" stroke="#d9a834" stroke-width="1"/>
    <rect x="25" y="41" width="13" height="14" rx="3" fill="#0c2620" stroke="#d9a834" stroke-width="1"/>
