    </g>
    <circle cx="60" cy="94" r="3.8" fill="#0e0e0e"/>
    <circle cx="118" cy="94" r="16.5" fill="#cfcdc3"/>
    <circle cx="118" cy="94" r="15" fill="#2c2c2a"/>
    <g stroke="#54534d" stroke-width="1.4">
