<svg xmlns="http://www.w3.org/2000/svg" viewBox="-3 38.9 213 98.6"><g transform="translate(0, 25)" xmlns="http://www.w3.org/2000/svg">
    <!-- ===== WHEELS (drawn first; body overlaps their tops) ===== -->
