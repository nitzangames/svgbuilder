    <rect x="136" y="71" width="13" height="17" rx="2" fill="#191919"/>
    <rect x="136" y="75" width="13" height="2" fill="#d9a834"/>
    <rect x="2" y="80" width="188" height="8" fill="#0e0e0e"/>

